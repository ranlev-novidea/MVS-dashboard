name: Refresh Dashboard Daily

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Fetch Jira data and update dashboard
      env:
        JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      run: node fetch-jira-data.js
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update dashboard data" && git push)
